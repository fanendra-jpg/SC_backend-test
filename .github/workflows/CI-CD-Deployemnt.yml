name: SC Backend CI/CD

on:
  push:
    branches:
      - dev
      - uat
      - main

env:
  IMAGE_NAME: sc_backend

jobs:

# ---------------- BUILD AND PUSH ----------------

  build-and-push:

    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Set image tag (SHA)
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT


      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${GITHUB_SHA} .


      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${GITHUB_SHA}



# ---------------- DEV DEPLOY ----------------

  deploy-dev:

    if: github.ref == 'refs/heads/dev'

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to DEV
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}

          script: |

            cd /home/ubuntu/Dev-projects/shikshacart-code/Backend

            export IMAGE_TAG=${{ github.sha }}

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker compose pull sc_backend || true

            docker compose up -d --no-deps --force-recreate sc_backend

            docker image prune -af



# ---------------- UAT DEPLOY ----------------

  deploy-uat:

    if: github.ref == 'refs/heads/uat'

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to UAT
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.UAT_HOST }}
          username: ${{ secrets.UAT_USER }}
          key: ${{ secrets.UAT_SSH_KEY }}
          port: ${{ secrets.UAT_PORT }}

          script: |

            cd /home/ubuntu/shikshacart-code/Backend

            export IMAGE_TAG=${{ github.sha }}

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker compose pull sc_backend || true

            docker compose up -d --no-deps --force-recreate sc_backend

            docker image prune -af



# ---------------- PROD DEPLOY ----------------

  deploy-prod:

    if: github.ref == 'refs/heads/main'

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to PRODUCTION
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}

          script: |

            cd /opt/shikshacart

            export IMAGE_TAG=${{ github.sha }}

            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker compose pull sc_backend || true

            docker compose up -d --no-deps --force-recreate sc_backend

            docker image prune -af
